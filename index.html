<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prohorizon Task Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 text-[11px]">
    <!-- Login -->
    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[200]">
        <div class="bg-white p-10 rounded shadow-2xl w-96 border-t-8 border-red-600 text-center">
            <h1 class="text-2xl font-black italic uppercase">PROHORIZON <span class="text-red-600">OS</span></h1>
            <input type="text" id="username" placeholder="Username" class="w-full border-2 p-3 mt-4 rounded font-bold uppercase outline-red-600">
            <input type="password" id="password" placeholder="Password" class="w-full border-2 p-3 mt-4 rounded font-bold outline-red-600">
            <button onclick="handleLogin()" class="w-full bg-red-600 text-white py-4 mt-6 rounded font-black uppercase">Login</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden max-w-[1600px] mx-auto p-4">
        <div class="bg-white p-6 rounded shadow-sm border-t-4 border-red-600 mb-4 flex justify-between items-center flex-wrap gap-4">
            <h1 class="text-2xl font-black italic uppercase text-slate-700">PROHORIZON <span class="text-red-600">TASK MANAGEMENT</span></h1>
            <div class="flex items-center gap-2 flex-wrap">
                <button onclick="loadTasks()" class="bg-slate-100 p-2 rounded border font-bold hover:bg-slate-200">🔄 Refresh</button>
                <button onclick="exportTemplate()" class="bg-slate-700 text-white px-3 py-2 rounded font-black uppercase">1. TEMPLATE</button>
                <label class="bg-blue-600 text-white px-3 py-2 rounded font-black uppercase cursor-pointer">2. IMPORT EXCEL<input type="file" class="hidden" accept=".xlsx,.xls" onchange="importExcel(this)"></label>
                <button onclick="showModal()" class="bg-black text-white px-3 py-2 rounded font-black uppercase">+ MANUAL TASK</button>
                <button onclick="exportExcel()" class="bg-red-600 text-white px-3 py-2 rounded font-black uppercase">EXPORT EXCEL</button>
                <button onclick="handleLogout()" class="text-gray-400 font-black ml-2">LOGOUT</button>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-5 gap-4 mb-6">
            <div onclick="filterByPriority('High')" class="bg-white p-5 rounded shadow border-b-4 border-red-600 text-center cursor-pointer hover:bg-red-50">
                <p class="text-[9px] text-gray-400 uppercase font-black">HIGH PRIORITY</p>
                <p id="countHigh" class="text-3xl text-red-600 font-black">0</p>
            </div>
            <div onclick="filterByPriority('Normal')" class="bg-white p-5 rounded shadow border-b-4 border-yellow-500 text-center cursor-pointer hover:bg-yellow-50">
                <p class="text-[9px] text-gray-400 uppercase font-black">NORMAL</p>
                <p id="countNormal" class="text-3xl text-yellow-500 font-black">0</p>
            </div>
            <div onclick="filterByPriority('Low')" class="bg-white p-5 rounded shadow border-b-4 border-blue-400 text-center cursor-pointer hover:bg-blue-50">
                <p class="text-[9px] text-gray-400 uppercase font-black">LOW</p>
                <p id="countLow" class="text-3xl text-blue-400 font-black">0</p>
            </div>
            <div class="bg-white p-5 rounded shadow border-b-4 border-slate-700 col-span-1 sm:col-span-2 flex flex-col sm:flex-row items-center justify-around gap-3">
                <input type="date" id="dateStart" onchange="filterData()" class="border p-2 rounded w-full sm:w-auto">
                <input type="date" id="dateEnd" onchange="filterData()" class="border p-2 rounded w-full sm:w-auto">
                <select id="statusFilter" onchange="filterData()" class="border p-2 rounded font-bold w-full sm:w-auto">
                    <option value="ALL">ALL STATUS</option>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded shadow-sm overflow-x-auto mb-4">
            <div class="p-4 font-bold text-lg">Total Tasks: <span id="totalTasks">0</span></div>
            <table class="w-full text-left min-w-[1100px]" id="mainTable">
                <thead class="bg-slate-800 text-white text-[9px] uppercase">
                    <tr>
                        <th class="p-4">ID</th>
                        <th>SUBJECT</th>
                        <th>ASSIGNEE</th>
                        <th>ADMIN</th>
                        <th>PRIORITY</th>
                        <th>STATUS</th>
                        <th>POC</th>
                        <th>DEADLINE</th>
                        <th>REMARK</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="taskBody" class="font-bold italic"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-[250]">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-[500px] border-t-8 border-red-600 max-h-[90vh] overflow-y-auto">
            <form id="taskForm" class="space-y-5">
                <input type="text" name="subject" placeholder="SUBJECT *" class="w-full border p-4 rounded font-bold uppercase outline-none focus:border-red-600" required>
                <input type="text" name="assignee" placeholder="ASSIGNEE *" class="w-full border p-4 rounded font-bold uppercase outline-none focus:border-red-600" required>
                <input type="text" name="admin" placeholder="ADMIN" class="w-full border p-4 rounded font-bold uppercase outline-none focus:border-red-600">
                <div class="grid grid-cols-2 gap-4">
                    <select name="priority" class="border p-4 rounded font-bold focus:border-red-600">
                        <option>High</option>
                        <option selected>Normal</option>
                        <option>Low</option>
                    </select>
                    <select name="status" class="border p-4 rounded font-bold focus:border-red-600">
                        <option value="Pending">Pending</option>
                        <option>In Progress</option>
                        <option>Closed</option>
                    </select>
                </div>
                <input type="date" name="deadline" class="w-full border p-4 rounded font-bold focus:border-red-600">
                <textarea name="remark" placeholder="REMARKS" class="w-full border p-4 rounded font-bold h-28 outline-none focus:border-red-600"></textarea>
                <input type="file" name="poc_file" class="w-full border p-3 rounded text-sm">
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-red-600 text-white py-4 rounded font-black uppercase hover:bg-red-700">SAVE TASK</button>
                    <button type="button" onclick="hideModal()" class="flex-1 bg-gray-300 text-gray-800 py-4 rounded font-black uppercase hover:bg-gray-400">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

<script>
    let allTasks = [];
    let currentFilterPriority = 'ALL';
    let editingTaskId = null;

    async function handleLogin() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if (!u || !p) return alert("Please enter username and password");

        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        if (res.ok) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadTasks();
        } else {
            alert("Login failed - check credentials");
        }
    }

    async function loadTasks() {
        try {
            const res = await fetch('/api/tasks');
            if (!res.ok) throw new Error();
            allTasks = await res.json();
            filterData();
        } catch {
            alert("Could not load tasks");
        }
    }

    function renderTable(tasks) {
        document.getElementById('taskBody').innerHTML = tasks.map(t => `
            <tr class="border-b hover:bg-slate-50">
                <td class="p-4 text-gray-500">#${t.id}</td>
                <td class="p-4 uppercase">${t.subject || ''}</td>
                <td class="p-4 text-blue-700">${t.assignee || '-'}</td>
                <td class="p-4 text-purple-700">${t.admin || '-'}</td>
                <td class="p-4 font-bold ${t.priority === 'High' ? 'text-red-600' : t.priority === 'Normal' ? 'text-yellow-600' : 'text-blue-600'}">${t.priority || '-'}</td>
                <td class="p-4 ${t.status === 'Closed' ? 'text-green-700' : t.status === 'In Progress' ? 'text-orange-600' : 'text-amber-600'}">${t.status}</td>
                <td class="p-4">
                    ${t.poc ? `<a href="/uploads/${t.poc}" target="_blank" class="text-blue-700 underline font-bold text-[10px]">View POC</a>` : '-'}
                </td>
                <td class="p-4">${t.deadline || '-'}</td>
                <td class="p-4 text-[10px] text-gray-600 uppercase">${t.remark || '-'}</td>
                <td class="p-4 flex gap-2 flex-wrap">
                    <button onclick="editTask(${t.id})" class="bg-blue-600 text-white px-3 py-1 rounded text-[9px] hover:bg-blue-700">EDIT</button>
                    <button onclick="deleteTask(${t.id})" class="bg-red-600 text-white px-3 py-1 rounded text-[9px] hover:bg-red-700">DELETE</button>
                    <button onclick="sendWA(${t.id})" class="text-green-700 font-black text-[10px] underline">WA</button>
                </td>
            </tr>
        `).join('');

        document.getElementById('countHigh').innerText   = allTasks.filter(t => t.priority === 'High').length;
        document.getElementById('countNormal').innerText = allTasks.filter(t => t.priority === 'Normal').length;
        document.getElementById('countLow').innerText    = allTasks.filter(t => t.priority === 'Low').length;
        document.getElementById('totalTasks').innerText  = tasks.length;
    }

    function filterByPriority(p) {
        currentFilterPriority = (currentFilterPriority === p) ? 'ALL' : p;
        filterData();
    }

    function filterData() {
        const start  = document.getElementById('dateStart').value;
        const end    = document.getElementById('dateEnd').value;
        const status = document.getElementById('statusFilter').value;

        const filtered = allTasks.filter(t => {
            const matchStatus   = status === 'ALL' || t.status === status;
            const matchPriority = currentFilterPriority === 'ALL' || t.priority === currentFilterPriority;
            let matchDate = true;
            if (start && end && t.created_at) {
                const taskDate = t.created_at.split(' ')[0];
                matchDate = taskDate >= start && taskDate <= end;
            }
            return matchStatus && matchPriority && matchDate;
        });

        renderTable(filtered);
    }

    async function deleteTask(id) {
        if (!confirm("Delete this task?")) return;
        try {
            const res = await fetch(`/api/tasks/${id}`, {method: 'DELETE'});
            if (res.ok) loadTasks();
            else alert("Delete failed");
        } catch {
            alert("Error deleting task");
        }
    }

    function editTask(id) {
        const t = allTasks.find(x => x.id === id);
        if (!t) return;

        editingTaskId = id;

        const form = document.getElementById('taskForm');
        form.subject.value   = t.subject   || '';
        form.assignee.value  = t.assignee  || '';
        form.admin.value     = t.admin     || '';
        form.priority.value  = t.priority  || 'Normal';
        form.status.value    = t.status    || 'Pending';
        form.deadline.value  = t.deadline  || '';
        form.remark.value    = t.remark    || '';

        showModal();
    }

    document.getElementById('taskForm').onsubmit = async (e) => {
        e.preventDefault();
        const form = e.target;

        if (editingTaskId !== null) {
            // Update (PUT) - JSON
            const jsonData = {
                subject:   form.subject.value.trim(),
                assignee:  form.assignee.value.trim(),
                admin:     form.admin.value.trim(),
                priority:  form.priority.value,
                status:    form.status.value,
                deadline:  form.deadline.value,
                remark:    form.remark.value.trim()
            };
            await fetch(`/api/tasks/${editingTaskId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(jsonData)
            });
        } else {
            // Create (POST) - FormData (supports file)
            await fetch('/api/tasks', {
                method: 'POST',
                body: new FormData(form)
            });
        }

        hideModal();
        editingTaskId = null;
        form.reset();
        loadTasks();
    };

    async function importExcel(input) {
        if (!input.files?.[0]) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);
                const res = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(json)
                });
                if (res.ok) loadTasks();
                else alert("Import failed - check Excel format");
            } catch (err) {
                alert("Invalid file: " + err.message);
            }
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    function exportTemplate() {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet([
            ["Subject", "Assignee", "Admin", "Priority", "Deadline"]
        ]);
        XLSX.utils.book_append_sheet(wb, ws, "Template");
        XLSX.writeFile(wb, "Prohorizon_Task_Template.xlsx");
    }

    function exportExcel() {
        const table = document.getElementById("mainTable").cloneNode(true);
        // Remove action column before export
        const rows = table.querySelectorAll('tr');
        rows.forEach(row => {
            if (row.cells.length > 9) {
                row.deleteCell(-1); // remove Actions
            }
        });
        const wb = XLSX.utils.table_to_book(table, {sheet: "Tasks"});
        XLSX.writeFile(wb, `Prohorizon_Tasks_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function showModal() { document.getElementById('modal').classList.remove('hidden'); }
    function hideModal() {
        document.getElementById('modal').classList.add('hidden');
        editingTaskId = null;
    }

    async function handleLogout() {
        await fetch('/api/logout');
        location.reload();
    }

    function sendWA(id) {
        const t = allTasks.find(x => x.id === id);
        if (!t) return;

        const msg = `*PROHORIZON TASK #${t.id}*%0A` +
                    `*Subject:* ${encodeURIComponent(t.subject || 'N/A')}%0A` +
                    `*Assignee:* ${t.assignee || '-'}%0A` +
                    `*Admin:* ${t.admin || '-'}%0A` +
                    `*Priority:* ${t.priority || 'Normal'}%0A` +
                    `*Status:* ${t.status}%0A` +
                    `*Deadline:* ${t.deadline || 'No deadline'}%0A` +
                    `*Remark:* ${encodeURIComponent(t.remark || '-')}%0A` +
                    `*Created:* ${t.created_at || 'N/A'}`;

        const phone = prompt("Enter WhatsApp number (with country code, e.g. 919876543210):", "91");
        if (phone) {
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }
    }
</script>
</body>
</html>
