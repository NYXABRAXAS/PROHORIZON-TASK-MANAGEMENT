<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prohorizon Task Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @keyframes pulse-red {
            0% { background-color: rgba(254, 226, 226, 0); }
            50% { background-color: rgba(254, 226, 226, 1); }
            100% { background-color: rgba(254, 226, 226, 0); }
        }
        .deadline-overdue { animation: pulse-red 2s infinite; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans text-slate-800 text-[11px]">

    <div class="max-w-[1600px] mx-auto">
        <div class="bg-white p-6 rounded shadow-sm border-t-4 border-red-600 mb-4 flex flex-wrap justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black italic text-slate-700 uppercase leading-none">Prohorizon <span class="text-red-600">Task Management</span></h1>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">Operational Control Dashboard</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-2">
                <input type="text" id="taskSearch" onkeyup="searchTasks()" placeholder="Search ID or Subject..." class="border-2 border-slate-200 rounded px-3 py-2 text-[10px] font-bold w-48 focus:border-red-600 outline-none">
                
                <div id="bulkActions" class="hidden flex gap-2 border-r pr-2">
                    <button onclick="bulkDelete()" class="bg-red-600 text-white px-3 py-2 rounded font-black uppercase">Delete</button>
                    <select onchange="bulkStatus(this.value); this.value=''" class="bg-slate-800 text-white px-3 py-2 rounded font-black uppercase outline-none">
                        <option value="">Bulk Status</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>

                <button onclick="toggleHistory()" class="bg-slate-100 text-slate-600 px-3 py-2 rounded font-bold uppercase border">History</button>
                <label class="bg-blue-600 text-white px-3 py-2 rounded font-bold uppercase cursor-pointer">Import <input type="file" class="hidden" onchange="handleImport(this)"></label>
                <button onclick="showModal()" class="bg-black text-white px-3 py-2 rounded font-bold uppercase">+ Manual</button>
                <button onclick="exportToExcel()" class="bg-red-600 text-white px-3 py-2 rounded font-bold uppercase">Export</button>
                <button onclick="loadTasks()" class="bg-slate-200 p-2 rounded hover:bg-slate-300">↻</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 mb-6">
            <div class="lg:col-span-8 grid grid-cols-3 gap-4">
                <div onclick="setFilter('High')" class="bg-white p-6 rounded shadow-sm border-b-4 border-red-600 cursor-pointer text-center">
                    <p class="text-[9px] text-gray-400 uppercase font-black">High Priority</p>
                    <p id="countHigh" class="text-3xl text-red-600 font-black">0</p>
                </div>
                <div onclick="setFilter('Normal')" class="bg-white p-6 rounded shadow-sm border-b-4 border-yellow-500 cursor-pointer text-center">
                    <p class="text-[9px] text-gray-400 uppercase font-black">Normal</p>
                    <p id="countNormal" class="text-3xl text-yellow-500 font-black">0</p>
                </div>
                <div onclick="setFilter('Low')" class="bg-white p-6 rounded shadow-sm border-b-4 border-blue-400 cursor-pointer text-center">
                    <p class="text-[9px] text-gray-400 uppercase font-black">Low</p>
                    <p id="countLow" class="text-3xl text-blue-400 font-black">0</p>
                </div>
            </div>
            <div class="lg:col-span-4 bg-white p-4 rounded shadow-sm border-b-4 border-slate-800 flex items-center">
                <div class="w-1/2 h-24"><canvas id="statusChart"></canvas></div>
                <div class="w-1/2 pl-4 space-y-1 font-black uppercase text-[9px]">
                    <div class="flex justify-between text-red-500"><span>Pending</span> <span id="sP">0</span></div>
                    <div class="flex justify-between text-yellow-600"><span>In Progress</span> <span id="sI">0</span></div>
                    <div class="flex justify-between text-green-600"><span>Closed</span> <span id="sC">0</span></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded shadow-sm overflow-hidden overflow-x-auto">
            <table class="w-full text-left" id="mainTable">
                <thead class="bg-slate-800 text-white text-[9px] uppercase">
                    <tr>
                        <th class="p-4"><input type="checkbox" onclick="toggleAll(this)"></th>
                        <th>Subject</th><th>Assignee</th><th>Priority</th><th>Status</th><th>Remark</th><th>Deadline</th><th>Created</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="taskBody" class="font-bold italic"></tbody>
            </table>
        </div>
    </div>

    <div id="historyDrawer" class="fixed right-0 top-0 h-full w-96 bg-white shadow-2xl transform translate-x-full transition-transform z-[60] border-l-4 border-red-600 flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h2 class="font-black uppercase text-red-600">Activity Logs</h2>
            <div class="flex gap-2">
                <button onclick="clearHistory()" class="text-[9px] bg-red-100 text-red-700 px-2 py-1 rounded font-black uppercase">Clear</button>
                <button onclick="toggleHistory()" class="text-gray-400 font-bold">X</button>
            </div>
        </div>
        <div id="historyList" class="p-6 space-y-3 overflow-y-auto flex-1 custom-scroll text-[10px]"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded w-[450px] border-t-8 border-red-600 shadow-2xl">
            <h2 id="modalTitle" class="text-lg font-black mb-6 uppercase text-red-600 tracking-tighter">Task Entry</h2>
            <input type="hidden" id="edit_id">
            <div class="space-y-4">
                <input type="text" id="m_subject" placeholder="Task Subject" class="w-full border p-3 rounded font-black uppercase outline-red-600">
                <input type="text" id="m_assignee" placeholder="Assignee Name" class="w-full border p-3 rounded font-black uppercase outline-red-600">
                <div class="grid grid-cols-2 gap-2">
                    <select id="m_priority" class="border p-3 rounded font-black"><option>High</option><option selected>Normal</option><option>Low</option></select>
                    <select id="m_status" class="border p-3 rounded font-black"><option>Pending</option><option>In Progress</option><option>Closed</option></select>
                </div>
                <input type="text" id="m_deadline" placeholder="Deadline (DD/MM/YYYY)" class="w-full border p-3 rounded font-black">
                <textarea id="m_remark" placeholder="Detailed Remarks..." class="w-full border p-3 rounded font-black h-24 uppercase"></textarea>
                <button onclick="saveTask()" class="w-full bg-red-600 text-white py-4 rounded font-black uppercase shadow-lg">Submit & Save</button>
                <button onclick="hideModal()" class="w-full text-gray-400 font-bold mt-2 uppercase text-center">Cancel</button>
            </div>
        </div>
    </div>

<script>
    const AUTH = "admin123";
    let allTasks = [];
    let statusChart = null;

    async function loadTasks() {
        const res = await fetch('/api/tasks');
        allTasks = await res.json();
        renderTable(allTasks);
        updateDashboard(allTasks);
    }

    function renderTable(tasks) {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('taskBody').innerHTML = tasks.map(t => {
            let dClass = "text-gray-500";
            let rClass = "border-b hover:bg-slate-50";
            if (t.deadline && t.status !== 'Closed') {
                const dDate = new Date(t.deadline.split('/').reverse().join('-')).toISOString().split('T')[0];
                if (dDate < today) { dClass = "text-red-600 font-black"; rClass += " deadline-overdue"; }
                else if (dDate === today) dClass = "text-orange-500 font-black underline";
            }
            return `
                <tr class="${rClass}" data-id="${t.id}" data-subject="${t.subject.toLowerCase()}">
                    <td class="p-4"><input type="checkbox" class="task-check" value="${t.id}" onclick="updateBulkUI()"></td>
                    <td class="p-4 uppercase">${t.subject}</td>
                    <td class="p-4 uppercase text-blue-600">${t.assignee}</td>
                    <td class="p-4 uppercase ${t.priority === 'High' ? 'text-red-600' : 'text-yellow-600'}">${t.priority}</td>
                    <td class="p-4 uppercase">${t.status}</td>
                    <td class="p-4 text-gray-400 font-normal italic">${t.remark || '-'}</td>
                    <td class="p-4 ${dClass}">${t.deadline || '-'}</td>
                    <td class="p-4 text-gray-400 font-normal">${t.created_at}</td>
                    <td class="p-4 flex gap-2">
                        <button onclick="editTask(${t.id})" class="text-blue-600 hover:scale-110 transition">✎</button>
                        <button onclick="sendWA(${t.id})" class="text-green-600 hover:scale-110 transition">WA</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function updateDashboard(tasks) {
        const counts = { High: 0, Normal: 0, Low: 0, P: 0, I: 0, C: 0 };
        tasks.forEach(t => {
            counts[t.priority]++;
            if (t.status === 'Pending') counts.P++;
            else if (t.status === 'In Progress') counts.I++;
            else counts.C++;
        });
        ['High', 'Normal', 'Low'].forEach(p => document.getElementById('count'+p).innerText = counts[p]);
        document.getElementById('sP').innerText = counts.P;
        document.getElementById('sI').innerText = counts.I;
        document.getElementById('sC').innerText = counts.C;

        if (statusChart) statusChart.destroy();
        statusChart = new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: { datasets: [{ data: [counts.P, counts.I, counts.C], backgroundColor: ['#ef4444', '#eab308', '#22c55e'] }] },
            options: { cutout: '75%', plugins: { legend: { display: false } } }
        });
    }

    async function saveTask() {
        const id = document.getElementById('edit_id').value;
        const data = {
            subject: document.getElementById('m_subject').value,
            assignee: document.getElementById('m_assignee').value,
            priority: document.getElementById('m_priority').value,
            status: document.getElementById('m_status').value,
            deadline: document.getElementById('m_deadline').value,
            remark: document.getElementById('m_remark').value
        };
        const url = id ? `/api/tasks/update/${id}` : '/api/tasks';
        await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        hideModal(); loadTasks();
    }

    async function bulkDelete() {
        if (prompt("Enter Admin Pass:") !== AUTH) return;
        const ids = Array.from(document.querySelectorAll('.task-check:checked')).map(cb => cb.value);
        await fetch('/api/tasks/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ids }) });
        loadTasks();
    }

    async function bulkStatus(s) {
        if (!s) return;
        const ids = Array.from(document.querySelectorAll('.task-check:checked')).map(cb => cb.value);
        await fetch('/api/tasks/bulk-status', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ids, status: s }) });
        loadTasks();
    }

    function editTask(id) {
        const t = allTasks.find(x => x.id === id);
        document.getElementById('edit_id').value = t.id;
        document.getElementById('m_subject').value = t.subject;
        document.getElementById('m_assignee').value = t.assignee;
        document.getElementById('m_priority').value = t.priority;
        document.getElementById('m_status').value = t.status;
        document.getElementById('m_deadline').value = t.deadline;
        document.getElementById('m_remark').value = t.remark;
        document.getElementById('modalTitle').innerText = "Update Task #" + id;
        showModal();
    }

    function sendWA(id) {
        const t = allTasks.find(x => x.id === id);
        const phone = prompt("Assignee Phone (91...):", "91");
        if (!phone) return;
        const msg = `*PROHORIZON TASK*%0A*Sub:* ${t.subject}%0A*Assignee:* ${t.assignee}%0A*Priority:* ${t.priority}%0A*Status:* ${t.status}%0A*Deadline:* ${t.deadline}`;
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }

    async function toggleHistory() {
        const d = document.getElementById('historyDrawer');
        if (d.classList.contains('translate-x-full')) {
            const res = await fetch('/api/history');
            const logs = await res.json();
            document.getElementById('historyList').innerHTML = logs.map(l => `<div class="bg-slate-50 p-2 rounded border-l-2 border-red-500"><p class="font-bold">${l.action}</p><p class="text-[8px] text-gray-400 uppercase mt-1">${l.time}</p></div>`).join('');
            d.classList.remove('translate-x-full');
        } else d.classList.add('translate-x-full');
    }

    async function clearHistory() { if (prompt("Auth:") === AUTH) { await fetch('/api/history/clear', {method: 'POST'}); toggleHistory(); toggleHistory(); } }
    function showModal() { document.getElementById('modal').classList.remove('hidden'); }
    function hideModal() { 
        document.getElementById('modal').classList.add('hidden'); 
        document.getElementById('edit_id').value = '';
        document.getElementById('modalTitle').innerText = "Task Entry";
    }
    function updateBulkUI() { document.getElementById('bulkActions').classList.toggle('hidden', document.querySelectorAll('.task-check:checked').length === 0); }
    function toggleAll(s) { document.querySelectorAll('.task-check').forEach(cb => cb.checked = s.checked); updateBulkUI(); }
    function searchTasks() {
        const q = document.getElementById('taskSearch').value.toLowerCase();
        document.querySelectorAll('#taskBody tr').forEach(r => r.style.display = (r.innerText.toLowerCase().includes(q)) ? "" : "none");
    }

    async function handleImport(input) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            await fetch('/api/tasks', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            loadTasks();
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    function exportToExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("mainTable")), "PH_Tasks.xlsx"); }

    loadTasks();
</script>
</body>
</html>
