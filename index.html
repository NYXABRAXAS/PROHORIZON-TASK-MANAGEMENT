<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prohorizon OS | Task Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @keyframes pulse-red {
            0% { background-color: rgba(254, 226, 226, 0); }
            50% { background-color: rgba(254, 226, 226, 1); }
            100% { background-color: rgba(254, 226, 226, 0); }
        }
        .deadline-overdue { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 text-[11px]">

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-10 rounded-xl shadow-2xl w-96 border-t-8 border-red-600">
            <h1 class="text-3xl font-black italic text-slate-800 uppercase text-center mb-1">PROHORIZON</h1>
            <p class="text-center text-gray-400 font-bold mb-8 uppercase tracking-widest text-[9px]">Secure Access Gateway</p>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full border-2 p-3 rounded font-bold uppercase outline-red-600">
                <input type="password" id="password" placeholder="Password" class="w-full border-2 p-3 rounded font-bold outline-red-600">
                <button onclick="handleLogin()" class="w-full bg-red-600 text-white py-4 rounded font-black uppercase shadow-lg hover:bg-red-700 transition">Login</button>
                <p id="loginError" class="text-red-500 font-bold text-center hidden">Access Denied: Invalid Credentials</p>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden max-w-[1600px] mx-auto p-4">
        <div class="bg-white p-6 rounded shadow-sm border-t-4 border-red-600 mb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic text-slate-700 uppercase leading-none">Prohorizon <span class="text-red-600">Tasks</span></h1>
            </div>
            <div class="flex gap-2">
                <input type="text" id="taskSearch" onkeyup="searchTasks()" placeholder="Search..." class="border p-2 rounded w-40 font-bold">
                <button id="btnDelete" onclick="bulkDelete()" class="hidden bg-red-600 text-white px-3 py-2 rounded font-black uppercase">Delete</button>
                <button onclick="showModal()" class="bg-black text-white px-4 py-2 rounded font-black uppercase">+ Manual</button>
                <button onclick="toggleHistory()" class="bg-slate-100 px-4 py-2 rounded font-black uppercase border">History</button>
                <button onclick="handleLogout()" class="bg-slate-200 text-slate-600 px-4 py-2 rounded font-black uppercase">Logout</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 mb-6 text-center">
            <div class="lg:col-span-8 grid grid-cols-3 gap-4">
                <div class="bg-white p-6 rounded shadow border-b-4 border-red-600">
                    <p class="text-[9px] text-gray-400 uppercase font-black">High Priority</p>
                    <p id="countHigh" class="text-3xl text-red-600 font-black">0</p>
                </div>
                <div class="bg-white p-6 rounded shadow border-b-4 border-yellow-500">
                    <p class="text-[9px] text-gray-400 uppercase font-black">Normal</p>
                    <p id="countNormal" class="text-3xl text-yellow-500 font-black">0</p>
                </div>
                <div class="bg-white p-6 rounded shadow border-b-4 border-blue-400">
                    <p class="text-[9px] text-gray-400 uppercase font-black">Low</p>
                    <p id="countLow" class="text-3xl text-blue-400 font-black">0</p>
                </div>
            </div>
            <div class="lg:col-span-4 bg-white p-4 rounded shadow border-b-4 border-slate-800 flex items-center">
                <div class="w-1/2 h-24"><canvas id="statusChart"></canvas></div>
                <div class="w-1/2 font-black uppercase text-[9px] space-y-1 text-left pl-4">
                    <div class="text-red-500">Pending: <span id="sP">0</span></div>
                    <div class="text-yellow-600">In Progress: <span id="sI">0</span></div>
                    <div class="text-green-600">Closed: <span id="sC">0</span></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded shadow-sm overflow-hidden overflow-x-auto">
            <table class="w-full text-left" id="mainTable">
                <thead class="bg-slate-800 text-white uppercase text-[9px]">
                    <tr>
                        <th class="p-4"><input type="checkbox" onclick="toggleAll(this)"></th>
                        <th>Subject</th><th>Assignee</th><th>Priority</th><th>Status</th><th>Deadline</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="taskBody" class="font-bold italic"></tbody>
            </table>
        </div>
    </div>

    <div id="historyDrawer" class="fixed right-0 top-0 h-full w-80 bg-white shadow-2xl transform translate-x-full transition-transform z-[110] border-l-4 border-red-600 flex flex-col p-6">
        <h2 class="font-black uppercase text-red-600 mb-4">Activity Logs</h2>
        <div id="historyList" class="space-y-2 overflow-y-auto flex-1 text-[10px]"></div>
        <button onclick="toggleHistory()" class="mt-4 bg-slate-800 text-white p-2 rounded uppercase font-bold">Close</button>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[120]">
        <div class="bg-white p-8 rounded w-[450px] border-t-8 border-red-600">
            <input type="hidden" id="edit_id">
            <div class="space-y-4">
                <input type="text" id="m_subject" placeholder="SUBJECT" class="w-full border p-3 rounded font-black uppercase">
                <input type="text" id="m_assignee" placeholder="ASSIGNEE" class="w-full border p-3 rounded font-black uppercase">
                <div class="grid grid-cols-2 gap-2">
                    <select id="m_priority" class="border p-3 rounded font-black"><option>High</option><option selected>Normal</option><option>Low</option></select>
                    <select id="m_status" class="border p-3 rounded font-black"><option>Pending</option><option>In Progress</option><option>Closed</option></select>
                </div>
                <input type="text" id="m_deadline" placeholder="DD/MM/YYYY" class="w-full border p-3 rounded font-bold">
                <textarea id="m_remark" placeholder="REMARKS..." class="w-full border p-3 rounded font-black h-20 uppercase"></textarea>
                <button onclick="saveTask()" class="w-full bg-red-600 text-white py-3 rounded font-black uppercase">SAVE TASK</button>
                <button onclick="hideModal()" class="w-full text-gray-400 mt-2">CANCEL</button>
            </div>
        </div>
    </div>

<script>
    let allTasks = [];
    let statusChart = null;

    async function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        if (res.ok) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadTasks();
        } else { document.getElementById('loginError').classList.remove('hidden'); }
    }

    async function handleLogout() { await fetch('/api/logout'); location.reload(); }

    async function loadTasks() {
        const res = await fetch('/api/tasks');
        if (res.status === 401) return handleLogout();
        allTasks = await res.json();
        renderTable(allTasks);
        updateDashboard(allTasks);
    }

    function renderTable(tasks) {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('taskBody').innerHTML = tasks.map(t => {
            let dClass = "text-gray-500";
            let rClass = "border-b hover:bg-slate-50";
            if (t.deadline && t.status !== 'Closed') {
                const dDate = new Date(t.deadline.split('/').reverse().join('-')).toISOString().split('T')[0];
                if (dDate < today) { dClass = "text-red-600 font-black"; rClass += " deadline-overdue"; }
                else if (dDate === today) dClass = "text-orange-500 font-black underline";
            }
            return `
                <tr class="${rClass}">
                    <td class="p-4"><input type="checkbox" class="task-check" value="${t.id}" onclick="updateDeleteUI()"></td>
                    <td class="p-4 uppercase">${t.subject}</td>
                    <td class="p-4 uppercase text-blue-600">${t.assignee}</td>
                    <td class="p-4 uppercase ${t.priority === 'High' ? 'text-red-600' : 'text-yellow-600'}">${t.priority}</td>
                    <td class="p-4 uppercase">${t.status}</td>
                    <td class="p-4 ${dClass}">${t.deadline || '-'}</td>
                    <td class="p-4 flex gap-3">
                        <button onclick="editTask(${t.id})" class="text-blue-600 font-black">EDIT</button>
                        <button onclick="sendWA(${t.id})" class="text-green-600 font-black">WA</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function updateDashboard(tasks) {
        const counts = { High: 0, Normal: 0, Low: 0, P: 0, I: 0, C: 0 };
        tasks.forEach(t => {
            counts[t.priority]++;
            if (t.status === 'Pending') counts.P++;
            else if (t.status === 'In Progress') counts.I++;
            else counts.C++;
        });
        ['High', 'Normal', 'Low'].forEach(p => document.getElementById('count'+p).innerText = counts[p]);
        document.getElementById('sP').innerText = counts.P;
        document.getElementById('sI').innerText = counts.I;
        document.getElementById('sC').innerText = counts.C;

        if (statusChart) statusChart.destroy();
        statusChart = new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: { datasets: [{ data: [counts.P, counts.I, counts.C], backgroundColor: ['#ef4444', '#eab308', '#22c55e'] }] },
            options: { cutout: '75%', plugins: { legend: { display: false } } }
        });
    }

    async function saveTask() {
        const id = document.getElementById('edit_id').value;
        const data = {
            subject: document.getElementById('m_subject').value,
            assignee: document.getElementById('m_assignee').value,
            priority: document.getElementById('m_priority').value,
            status: document.getElementById('m_status').value,
            deadline: document.getElementById('m_deadline').value,
            remark: document.getElementById('m_remark').value
        };
        const url = id ? `/api/tasks/update/${id}` : '/api/tasks';
        await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        hideModal(); loadTasks();
    }

    function editTask(id) {
        const t = allTasks.find(x => x.id === id);
        document.getElementById('edit_id').value = t.id;
        document.getElementById('m_subject').value = t.subject;
        document.getElementById('m_assignee').value = t.assignee;
        document.getElementById('m_priority').value = t.priority;
        document.getElementById('m_status').value = t.status;
        document.getElementById('m_deadline').value = t.deadline;
        document.getElementById('m_remark').value = t.remark;
        showModal();
    }

    function sendWA(id) {
        const t = allTasks.find(x => x.id === id);
        const phone = prompt("Assignee Phone (91...):", "91");
        if (!phone) return;
        const msg = `*PROHORIZON TASK*%0A*Sub:* ${t.subject}%0A*Status:* ${t.status}%0A*Deadline:* ${t.deadline}`;
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }

    async function toggleHistory() {
        const d = document.getElementById('historyDrawer');
        if (d.classList.contains('translate-x-full')) {
            const res = await fetch('/api/history');
            const logs = await res.json();
            document.getElementById('historyList').innerHTML = logs.map(l => `<div class="bg-slate-50 p-2 border-l-2 border-red-600"><p>${l.action}</p></div>`).join('');
            d.classList.remove('translate-x-full');
        } else d.classList.add('translate-x-full');
    }

    async function bulkDelete() {
        const ids = Array.from(document.querySelectorAll('.task-check:checked')).map(cb => cb.value);
        await fetch('/api/tasks/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ids }) });
        loadTasks();
    }

    function showModal() { document.getElementById('modal').classList.remove('hidden'); }
    function hideModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('edit_id').value = ''; }
    function updateDeleteUI() { document.getElementById('btnDelete').classList.toggle('hidden', document.querySelectorAll('.task-check:checked').length === 0); }
    function toggleAll(s) { document.querySelectorAll('.task-check').forEach(cb => cb.checked = s.checked); updateDeleteUI(); }
</script>
</body>
</html>
